<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glossary Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Lato', sans-serif; background: #f5f5f5; color: #2d3b45; min-height: 100vh; }

    /* Canvas-style scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c7cdd1; border-radius: 3px; }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal {
      background: #fff; border-radius: 8px; width: 100%; max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .modal-lg { max-width: 720px; }
    .modal-header {
      background: #0770a3; color: #fff;
      padding: 18px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: #fff; cursor: pointer;
      font-size: 22px; line-height: 1; opacity: 0.8; padding: 2px 6px;
      border-radius: 4px; transition: opacity .15s;
    }
    .modal-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }
    .modal-body { padding: 24px; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid #e8eaec;
      display: flex; justify-content: flex-end; gap: 10px;
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; border-radius: 4px; font-size: 14px;
      font-weight: 700; font-family: 'Lato', sans-serif;
      cursor: pointer; border: none; transition: background .15s, box-shadow .15s;
      line-height: 1;
    }
    .btn-primary { background: #0081bd; color: #fff; }
    .btn-primary:hover { background: #006a9e; }
    .btn-secondary { background: #fff; color: #2d3b45; border: 1px solid #c7cdd1; }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn-danger { background: #e8001f; color: #fff; }
    .btn-danger:hover { background: #b50018; }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-icon { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 4px; color: #6b7780; transition: background .15s, color .15s; display: inline-flex; align-items: center; }
    .btn-icon:hover { background: #e8eaec; color: #2d3b45; }
    .btn-icon.danger:hover { background: #fce8ea; color: #e8001f; }

    /* Form elements */
    .form-group { margin-bottom: 18px; }
    .form-group:last-child { margin-bottom: 0; }
    label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 6px; color: #2d3b45; }
    label .required { color: #e8001f; margin-left: 2px; }
    input[type="text"], textarea, select {
      width: 100%; padding: 9px 12px; border: 1px solid #c7cdd1;
      border-radius: 4px; font-size: 14px; font-family: 'Lato', sans-serif;
      color: #2d3b45; background: #fff; transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: #0081bd; box-shadow: 0 0 0 2px rgba(0,129,189,0.18);
    }
    textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
    .help-text { font-size: 12px; color: #6b7780; margin-top: 5px; }

    /* Tag input */
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; }
    .tag {
      background: #e1f0f8; color: #0770a3; border-radius: 20px;
      padding: 3px 10px; font-size: 12px; font-weight: 700;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .tag-remove { cursor: pointer; opacity: 0.6; font-size: 14px; line-height: 1; }
    .tag-remove:hover { opacity: 1; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useRef, useMemo } = React;

// ─── Icons (inline SVGs) ───────────────────────────────────────────────────
const Icon = ({ name, size = 16 }) => {
  const icons = {
    plus: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>,
    search: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" strokeWidth="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    edit: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M11.5 2.5l2 2-8 8H3.5v-2l8-8z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5M3 4l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    import: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7l3 3 3-3M3 12h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    export: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M8 10V2M5 5l3-3 3 3M3 12h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    close: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>,
    chevronDown: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 6l5 5 5-5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    tag: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M2 2h6l6 6-6 6-6-6V2z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><circle cx="5.5" cy="5.5" r="1" fill="currentColor"/></svg>,
    book: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 2h8a1 1 0 011 1v10a1 1 0 01-1 1H3M3 2a1 1 0 00-1 1v10a1 1 0 001 1m0-12v12" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/><path d="M6 6h4M6 9h3" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 16 16" fill="none"><path d="M3 8l4 4 6-7" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };
  return icons[name] || null;
};

// ─── Storage ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'glossary_tool_v1';
const load = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
};
const save = (terms) => localStorage.setItem(STORAGE_KEY, JSON.stringify(terms));

const newId = () => Math.random().toString(36).slice(2);

// ─── TermModal (Add / Edit) ────────────────────────────────────────────────
function TermModal({ term, allCategories, onSave, onClose }) {
  const [termText, setTermText] = useState(term?.term || '');
  const [def, setDef] = useState(term?.definition || '');
  const [cats, setCats] = useState(term?.categories || []);
  const [catInput, setCatInput] = useState('');
  const [errors, setErrors] = useState({});
  const termRef = useRef();

  useEffect(() => { termRef.current?.focus(); }, []);

  const addCat = (val) => {
    const v = val.trim();
    if (v && !cats.includes(v)) setCats(c => [...c, v]);
    setCatInput('');
  };

  const validate = () => {
    const e = {};
    if (!termText.trim()) e.term = 'Term is required';
    if (!def.trim()) e.def = 'Definition is required';
    setErrors(e);
    return !Object.keys(e).length;
  };

  const handleSave = () => {
    if (!validate()) return;
    onSave({ id: term?.id || newId(), term: termText.trim(), definition: def.trim(), categories: cats, createdAt: term?.createdAt || Date.now(), updatedAt: Date.now() });
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2>{term ? 'Edit Term' : 'Add New Term'}</h2>
          <button className="modal-close" onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label>Term <span className="required">*</span></label>
            <input ref={termRef} type="text" value={termText} onChange={e => setTermText(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSave()} placeholder="Enter term…" />
            {errors.term && <div style={{ color: '#e8001f', fontSize: 12, marginTop: 4 }}>{errors.term}</div>}
          </div>
          <div className="form-group">
            <label>Definition <span className="required">*</span></label>
            <textarea value={def} onChange={e => setDef(e.target.value)} placeholder="Enter definition…" rows={4} />
            {errors.def && <div style={{ color: '#e8001f', fontSize: 12, marginTop: 4 }}>{errors.def}</div>}
          </div>
          <div className="form-group">
            <label>Categories</label>
            <div style={{ display: 'flex', gap: 8 }}>
              <input type="text" value={catInput} onChange={e => setCatInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addCat(catInput); } }}
                placeholder="Type a category and press Enter…"
                list="cat-suggestions" />
              <datalist id="cat-suggestions">
                {allCategories.filter(c => !cats.includes(c)).map(c => <option key={c} value={c} />)}
              </datalist>
              <button className="btn btn-secondary btn-sm" onClick={() => addCat(catInput)}>Add</button>
            </div>
            {cats.length > 0 && (
              <div className="tag-row">
                {cats.map(c => (
                  <span key={c} className="tag">{c}<span className="tag-remove" onClick={() => setCats(cs => cs.filter(x => x !== c))}>×</span></span>
                ))}
              </div>
            )}
            <div className="help-text">Press Enter or comma to add. Use categories to group related terms.</div>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={handleSave}><Icon name="check" size={14} />{term ? 'Save Changes' : 'Add Term'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── ImportModal ───────────────────────────────────────────────────────────
function ImportModal({ onImport, onClose }) {
  const [raw, setRaw] = useState('');
  const [preview, setPreview] = useState([]);
  const [parsed, setParsed] = useState(false);
  const [fmt, setFmt] = useState('auto');
  const [error, setError] = useState('');

  const parse = () => {
    setError('');
    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    const results = [];
    let i = 0;

    // Try JSON
    try {
      const json = JSON.parse(raw);
      if (Array.isArray(json)) {
        json.forEach(item => {
          if (item.term && item.definition) {
            results.push({ id: newId(), term: item.term, definition: item.definition, categories: item.categories || [], createdAt: Date.now(), updatedAt: Date.now() });
          }
        });
        if (results.length) { setPreview(results); setParsed(true); return; }
      }
    } catch {}

    // Try formats
    lines.forEach(line => {
      // "Term: Definition" or "Term - Definition" or "Term\tDefinition"
      let m;
      if ((m = line.match(/^(.+?)\s*:\s+(.+)$/))) {
        results.push({ id: newId(), term: m[1].trim(), definition: m[2].trim(), categories: [], createdAt: Date.now(), updatedAt: Date.now() });
      } else if ((m = line.match(/^(.+?)\t(.+)$/))) {
        results.push({ id: newId(), term: m[1].trim(), definition: m[2].trim(), categories: [], createdAt: Date.now(), updatedAt: Date.now() });
      } else if ((m = line.match(/^(.+?)\s{2,}(.+)$/))) {
        results.push({ id: newId(), term: m[1].trim(), definition: m[2].trim(), categories: [], createdAt: Date.now(), updatedAt: Date.now() });
      }
    });

    // Try consecutive pairs (odd=term, even=def)
    if (!results.length && lines.length >= 2) {
      for (let j = 0; j < lines.length - 1; j += 2) {
        results.push({ id: newId(), term: lines[j], definition: lines[j+1], categories: [], createdAt: Date.now(), updatedAt: Date.now() });
      }
    }

    if (!results.length) {
      setError('Could not parse your content. See format guide below.');
      return;
    }
    setPreview(results);
    setParsed(true);
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h2>Import Terms</h2>
          <button className="modal-close" onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="modal-body" style={{ maxHeight: '70vh', overflowY: 'auto' }}>
          {!parsed ? (
            <>
              <div className="form-group">
                <label>Paste your content</label>
                <textarea value={raw} onChange={e => setRaw(e.target.value)} rows={10}
                  placeholder={"Paste terms here. Supported formats:\n\nTerm: Definition\nTerm\tDefinition\n\nor pairs (one per line):\nTerm\nDefinition\n\nor JSON array: [{\"term\":\"...\",\"definition\":\"...\"}]"} />
                {error && <div style={{ color: '#e8001f', fontSize: 13, marginTop: 6 }}>{error}</div>}
              </div>
              <div style={{ background: '#f5f5f5', borderRadius: 6, padding: '12px 16px', fontSize: 13, color: '#6b7780' }}>
                <strong style={{ color: '#2d3b45' }}>Supported formats:</strong>
                <ul style={{ marginTop: 6, paddingLeft: 18, lineHeight: 1.8 }}>
                  <li><code>Term: Definition</code> — colon-separated</li>
                  <li><code>Term[tab]Definition</code> — tab-separated (from spreadsheets)</li>
                  <li>Alternating lines: term on one line, definition on the next</li>
                  <li>JSON array: <code>{`[{"term":"...","definition":"..."}]`}</code></li>
                </ul>
              </div>
            </>
          ) : (
            <>
              <div style={{ marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ background: '#e8f4ea', color: '#2d7a3c', borderRadius: 4, padding: '6px 12px', fontSize: 13, fontWeight: 700 }}>
                  <Icon name="check" size={13} /> Found {preview.length} term{preview.length !== 1 ? 's' : ''}
                </div>
                <button className="btn btn-secondary btn-sm" onClick={() => setParsed(false)}>← Back</button>
              </div>
              <div style={{ border: '1px solid #e8eaec', borderRadius: 6, overflow: 'hidden', maxHeight: 360, overflowY: 'auto' }}>
                {preview.map((t, i) => (
                  <div key={t.id} style={{ padding: '10px 14px', borderBottom: i < preview.length-1 ? '1px solid #f0f0f0' : 'none', background: i % 2 === 0 ? '#fff' : '#fafafa' }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{t.term}</div>
                    <div style={{ fontSize: 13, color: '#6b7780', marginTop: 2 }}>{t.definition}</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          {!parsed
            ? <button className="btn btn-primary" onClick={parse} disabled={!raw.trim()}>Parse Content</button>
            : <button className="btn btn-primary" onClick={() => onImport(preview)}><Icon name="import" size={14} /> Import {preview.length} Terms</button>
          }
        </div>
      </div>
    </div>
  );
}

// ─── DeleteConfirm ─────────────────────────────────────────────────────────
function DeleteConfirm({ term, onConfirm, onClose }) {
  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: 400 }}>
        <div className="modal-header" style={{ background: '#e8001f' }}>
          <h2>Delete Term</h2>
          <button className="modal-close" onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="modal-body">
          <p style={{ fontSize: 15, lineHeight: 1.5 }}>
            Are you sure you want to delete <strong>"{term.term}"</strong>? This cannot be undone.
          </p>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-danger" onClick={onConfirm}>Delete</button>
        </div>
      </div>
    </div>
  );
}

// ─── ExportModal ───────────────────────────────────────────────────────────
function ExportModal({ terms, onClose }) {
  const [fmt, setFmt] = useState('json');
  const [copied, setCopied] = useState(false);

  const output = useMemo(() => {
    const sorted = [...terms].sort((a, b) => a.term.localeCompare(b.term));
    if (fmt === 'json') return JSON.stringify(sorted.map(({ id, createdAt, updatedAt, ...rest }) => rest), null, 2);
    if (fmt === 'tsv') return sorted.map(t => `${t.term}\t${t.definition}`).join('\n');
    if (fmt === 'csv') return ['term,definition,categories', ...sorted.map(t => `"${t.term.replace(/"/g,'""')}","${t.definition.replace(/"/g,'""')}","${t.categories.join(';')}"`)].join('\n');
    return sorted.map(t => `${t.term}: ${t.definition}`).join('\n');
  }, [terms, fmt]);

  const copy = () => {
    navigator.clipboard.writeText(output).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const download = () => {
    const ext = { json: 'json', tsv: 'tsv', csv: 'csv', plain: 'txt' }[fmt];
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(output);
    a.download = `glossary.${ext}`;
    a.click();
  };

  return (
    <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <h2>Export Glossary</h2>
          <button className="modal-close" onClick={onClose}><Icon name="close" size={18} /></button>
        </div>
        <div className="modal-body">
          <div className="form-group">
            <label>Format</label>
            <select value={fmt} onChange={e => setFmt(e.target.value)}>
              <option value="json">JSON</option>
              <option value="tsv">TSV (spreadsheet)</option>
              <option value="csv">CSV</option>
              <option value="plain">Plain text (Term: Definition)</option>
            </select>
          </div>
          <div className="form-group">
            <label>Preview</label>
            <textarea value={output} readOnly rows={10} style={{ fontFamily: 'monospace', fontSize: 12, background: '#f5f5f5' }} />
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Close</button>
          <button className="btn btn-secondary" onClick={copy}>{copied ? '✓ Copied!' : 'Copy to Clipboard'}</button>
          <button className="btn btn-primary" onClick={download}><Icon name="export" size={14} /> Download</button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────
function App() {
  const [terms, setTerms] = useState(load);
  const [search, setSearch] = useState('');
  const [filterLetter, setFilterLetter] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [modal, setModal] = useState(null); // null | 'add' | 'edit' | 'delete' | 'import' | 'export'
  const [activeTerm, setActiveTerm] = useState(null);
  const [expandedId, setExpandedId] = useState(null);

  useEffect(() => { save(terms); }, [terms]);

  const allCategories = useMemo(() => {
    const cats = new Set();
    terms.forEach(t => t.categories?.forEach(c => cats.add(c)));
    return [...cats].sort();
  }, [terms]);

  const letters = useMemo(() => {
    const s = new Set(terms.map(t => t.term[0]?.toUpperCase()).filter(Boolean));
    return [...s].sort();
  }, [terms]);

  const filtered = useMemo(() => {
    let r = [...terms];
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(t => t.term.toLowerCase().includes(q) || t.definition.toLowerCase().includes(q));
    }
    if (filterLetter) r = r.filter(t => t.term[0]?.toUpperCase() === filterLetter);
    if (filterCat) r = r.filter(t => t.categories?.includes(filterCat));
    return r.sort((a, b) => a.term.localeCompare(b.term));
  }, [terms, search, filterLetter, filterCat]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(t => {
      const l = t.term[0]?.toUpperCase() || '#';
      if (!g[l]) g[l] = [];
      g[l].push(t);
    });
    return g;
  }, [filtered]);

  const groupedKeys = Object.keys(grouped).sort();

  const handleSave = (t) => {
    setTerms(prev => {
      const idx = prev.findIndex(x => x.id === t.id);
      if (idx >= 0) { const n = [...prev]; n[idx] = t; return n; }
      return [...prev, t];
    });
    setModal(null);
    setActiveTerm(null);
  };

  const handleDelete = () => {
    setTerms(prev => prev.filter(x => x.id !== activeTerm.id));
    setModal(null);
    setActiveTerm(null);
    if (expandedId === activeTerm.id) setExpandedId(null);
  };

  const handleImport = (incoming) => {
    setTerms(prev => {
      const existing = new Set(prev.map(t => t.term.toLowerCase()));
      const fresh = incoming.filter(t => !existing.has(t.term.toLowerCase()));
      return [...prev, ...fresh];
    });
    setModal(null);
  };

  const clearFilters = () => { setFilterLetter(''); setFilterCat(''); setSearch(''); };

  const hasFilter = search || filterLetter || filterCat;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', minHeight: '100vh' }}>
      {/* Header */}
      <header style={{ background: '#0770a3', color: '#fff', padding: '0 24px', height: 56, display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0, boxShadow: '0 2px 6px rgba(0,0,0,0.18)' }}>
        <Icon name="book" size={22} />
        <span style={{ fontWeight: 900, fontSize: 20, letterSpacing: '-0.3px' }}>Glossary Tool</span>
        <div style={{ flex: 1 }} />
        <button className="btn btn-secondary btn-sm" style={{ background: 'rgba(255,255,255,0.15)', color: '#fff', border: '1px solid rgba(255,255,255,0.3)' }} onClick={() => setModal('import')}>
          <Icon name="import" size={14} /> Import
        </button>
        <button className="btn btn-secondary btn-sm" style={{ background: 'rgba(255,255,255,0.15)', color: '#fff', border: '1px solid rgba(255,255,255,0.3)' }} onClick={() => setModal('export')} disabled={!terms.length}>
          <Icon name="export" size={14} /> Export
        </button>
        <button className="btn btn-primary" style={{ background: '#fff', color: '#0770a3' }} onClick={() => { setActiveTerm(null); setModal('add'); }}>
          <Icon name="plus" size={14} /> Add Term
        </button>
      </header>

      <div style={{ display: 'flex', flex: 1 }}>
        {/* Sidebar */}
        <aside style={{ width: 220, background: '#fff', borderRight: '1px solid #e8eaec', padding: '20px 0', flexShrink: 0, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 0 }}>
          {/* Stats */}
          <div style={{ padding: '0 16px 16px', borderBottom: '1px solid #e8eaec' }}>
            <div style={{ fontSize: 28, fontWeight: 900, color: '#0770a3', lineHeight: 1 }}>{terms.length}</div>
            <div style={{ fontSize: 12, color: '#6b7780', marginTop: 2 }}>total term{terms.length !== 1 ? 's' : ''}</div>
          </div>

          {/* Alphabet filter */}
          <div style={{ padding: '14px 16px 10px' }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: '#6b7780', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Browse A–Z</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
              {Array.from('ABCDEFGHIJKLMNOPQRSTUVWXYZ').map(l => {
                const has = letters.includes(l);
                const active = filterLetter === l;
                return (
                  <button key={l} onClick={() => setFilterLetter(active ? '' : l)}
                    style={{ width: 26, height: 26, borderRadius: 4, fontSize: 12, fontWeight: 700, cursor: has ? 'pointer' : 'default',
                      background: active ? '#0770a3' : has ? '#e1f0f8' : '#f5f5f5',
                      color: active ? '#fff' : has ? '#0770a3' : '#c7cdd1',
                      border: 'none', fontFamily: 'Lato, sans-serif',
                      transition: 'background .12s, color .12s' }}>
                    {l}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Category filter */}
          {allCategories.length > 0 && (
            <div style={{ padding: '14px 16px 10px', borderTop: '1px solid #e8eaec' }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: '#6b7780', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Categories</div>
              {allCategories.map(c => (
                <button key={c} onClick={() => setFilterCat(filterCat === c ? '' : c)}
                  style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%', padding: '6px 8px', borderRadius: 4, fontSize: 13, fontWeight: filterCat === c ? 700 : 400, cursor: 'pointer',
                    background: filterCat === c ? '#e1f0f8' : 'none', color: filterCat === c ? '#0770a3' : '#2d3b45',
                    border: 'none', fontFamily: 'Lato, sans-serif', textAlign: 'left', transition: 'background .12s' }}>
                  <Icon name="tag" size={12} />
                  <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c}</span>
                </button>
              ))}
            </div>
          )}
        </aside>

        {/* Main */}
        <main style={{ flex: 1, overflowY: 'auto', padding: 28 }}>
          {/* Search bar */}
          <div style={{ display: 'flex', gap: 10, marginBottom: 20, alignItems: 'center' }}>
            <div style={{ position: 'relative', flex: 1, maxWidth: 480 }}>
              <span style={{ position: 'absolute', left: 11, top: '50%', transform: 'translateY(-50%)', color: '#6b7780', pointerEvents: 'none' }}>
                <Icon name="search" size={16} />
              </span>
              <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Search terms and definitions…"
                style={{ paddingLeft: 36, width: '100%' }} />
            </div>
            {hasFilter && (
              <button className="btn btn-secondary btn-sm" onClick={clearFilters} style={{ whiteSpace: 'nowrap' }}>
                Clear filters
              </button>
            )}
            <div style={{ marginLeft: 'auto', fontSize: 13, color: '#6b7780' }}>
              {hasFilter ? `${filtered.length} of ${terms.length}` : `${terms.length}`} term{terms.length !== 1 ? 's' : ''}
            </div>
          </div>

          {/* Active filters display */}
          {(filterLetter || filterCat) && (
            <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
              {filterLetter && <span className="tag">Letter: {filterLetter} <span className="tag-remove" onClick={() => setFilterLetter('')}>×</span></span>}
              {filterCat && <span className="tag">Category: {filterCat} <span className="tag-remove" onClick={() => setFilterCat('')}>×</span></span>}
            </div>
          )}

          {/* Empty state */}
          {terms.length === 0 && (
            <div style={{ textAlign: 'center', padding: '80px 20px', color: '#6b7780' }}>
              <Icon name="book" size={48} />
              <div style={{ fontSize: 20, fontWeight: 700, color: '#2d3b45', marginTop: 16, marginBottom: 8 }}>No terms yet</div>
              <div style={{ fontSize: 14, marginBottom: 24 }}>Add your first term or import a list to get started.</div>
              <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
                <button className="btn btn-primary" onClick={() => setModal('add')}><Icon name="plus" size={14} /> Add Term</button>
                <button className="btn btn-secondary" onClick={() => setModal('import')}><Icon name="import" size={14} /> Import</button>
              </div>
            </div>
          )}

          {/* No results */}
          {terms.length > 0 && filtered.length === 0 && (
            <div style={{ textAlign: 'center', padding: '60px 20px', color: '#6b7780' }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#2d3b45', marginBottom: 8 }}>No matching terms</div>
              <div style={{ fontSize: 14 }}>Try a different search or clear your filters.</div>
            </div>
          )}

          {/* Term groups */}
          {groupedKeys.map(letter => (
            <div key={letter} style={{ marginBottom: 28 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
                <div style={{ width: 36, height: 36, borderRadius: 6, background: '#0770a3', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: 18, flexShrink: 0 }}>{letter}</div>
                <div style={{ flex: 1, height: 1, background: '#e8eaec' }} />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {grouped[letter].map(t => {
                  const expanded = expandedId === t.id;
                  return (
                    <div key={t.id}
                      style={{ background: '#fff', border: '1px solid #e8eaec', borderRadius: 6, overflow: 'hidden', transition: 'box-shadow .15s', boxShadow: expanded ? '0 2px 8px rgba(0,0,0,0.08)' : 'none' }}>
                      <div onClick={() => setExpandedId(expanded ? null : t.id)}
                        style={{ display: 'flex', alignItems: 'center', padding: '12px 16px', cursor: 'pointer', userSelect: 'none', gap: 10 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: 700, fontSize: 15, color: '#2d3b45' }}>{t.term}</div>
                          {!expanded && t.categories?.length > 0 && (
                            <div style={{ display: 'flex', gap: 4, marginTop: 4 }}>
                              {t.categories.slice(0, 3).map(c => <span key={c} className="tag" style={{ fontSize: 11 }}>{c}</span>)}
                            </div>
                          )}
                        </div>
                        <div style={{ display: 'flex', gap: 4, alignItems: 'center' }} onClick={e => e.stopPropagation()}>
                          <button className="btn-icon" title="Edit" onClick={() => { setActiveTerm(t); setModal('edit'); }}>
                            <Icon name="edit" size={15} />
                          </button>
                          <button className="btn-icon danger" title="Delete" onClick={() => { setActiveTerm(t); setModal('delete'); }}>
                            <Icon name="trash" size={15} />
                          </button>
                        </div>
                        <span style={{ color: '#c7cdd1', transform: expanded ? 'rotate(180deg)' : 'none', transition: 'transform .2s' }}>
                          <Icon name="chevronDown" size={16} />
                        </span>
                      </div>
                      {expanded && (
                        <div style={{ padding: '0 16px 14px', borderTop: '1px solid #f0f0f0' }}>
                          <p style={{ fontSize: 14, lineHeight: 1.65, color: '#2d3b45', marginTop: 10, textWrap: 'pretty' }}>{t.definition}</p>
                          {t.categories?.length > 0 && (
                            <div className="tag-row" style={{ marginTop: 10 }}>
                              {t.categories.map(c => <span key={c} className="tag">{c}</span>)}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </main>
      </div>

      {/* Modals */}
      {(modal === 'add' || modal === 'edit') && (
        <TermModal term={modal === 'edit' ? activeTerm : null} allCategories={allCategories} onSave={handleSave} onClose={() => { setModal(null); setActiveTerm(null); }} />
      )}
      {modal === 'delete' && activeTerm && (
        <DeleteConfirm term={activeTerm} onConfirm={handleDelete} onClose={() => { setModal(null); setActiveTerm(null); }} />
      )}
      {modal === 'import' && <ImportModal onImport={handleImport} onClose={() => setModal(null)} />}
      {modal === 'export' && <ExportModal terms={terms} onClose={() => setModal(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
